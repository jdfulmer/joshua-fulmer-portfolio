<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e1a"/>
      <stop offset="40%" stop-color="#0f1f0f"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="trailGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#57534e" stop-opacity="0"/>
      <stop offset="20%" stop-color="#57534e" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#57534e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#57534e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Distant mountain range -->
  <polygon points="0,580 200,380 400,480 600,320 800,420 1000,350 1200,440 1400,360 1600,410 1800,340 1920,450 1920,580" fill="#1c1917" opacity="0.6"/>
  <polygon points="0,620 150,460 350,520 550,400 750,500 950,430 1150,490 1350,420 1550,470 1750,400 1920,500 1920,620" fill="#1c1917" opacity="0.8"/>

  <!-- Treeline - PNW evergreens -->
  <g fill="#1a2e1a" opacity="0.9">
    <!-- Row of trees (simplified PNW silhouettes) -->
    <polygon points="80,600 100,420 120,600"/>
    <polygon points="120,600 145,380 170,600"/>
    <polygon points="200,600 230,350 260,600"/>
    <polygon points="280,600 305,390 330,600"/>
    <polygon points="350,600 380,360 410,600"/>
    <polygon points="430,600 455,400 480,600"/>
    <polygon points="500,600 530,340 560,600"/>
    <polygon points="580,600 610,380 640,600"/>
    <polygon points="660,600 685,370 710,600"/>
    <polygon points="730,600 760,350 790,600"/>
    <polygon points="810,600 840,390 870,600"/>
    <polygon points="890,600 920,360 950,600"/>
    <polygon points="970,600 1000,400 1030,600"/>
    <polygon points="1050,600 1080,350 1110,600"/>
    <polygon points="1130,600 1155,380 1180,600"/>
    <polygon points="1200,600 1230,370 1260,600"/>
    <polygon points="1280,600 1310,340 1340,600"/>
    <polygon points="1360,600 1385,390 1410,600"/>
    <polygon points="1430,600 1460,360 1490,600"/>
    <polygon points="1510,600 1540,400 1570,600"/>
    <polygon points="1590,600 1620,350 1650,600"/>
    <polygon points="1670,600 1695,380 1720,600"/>
    <polygon points="1740,600 1770,360 1800,600"/>
    <polygon points="1820,600 1850,390 1880,600"/>
  </g>

  <!-- Closer treeline -->
  <g fill="#142214" opacity="0.95">
    <polygon points="60,680 90,480 120,680"/>
    <polygon points="160,680 195,440 230,680"/>
    <polygon points="270,680 300,460 330,680"/>
    <polygon points="370,680 400,480 430,680"/>
    <polygon points="480,680 510,450 540,680"/>
    <polygon points="590,680 620,470 650,680"/>
    <polygon points="700,680 730,440 760,680"/>
    <polygon points="810,680 840,460 870,680"/>
    <polygon points="920,680 950,480 980,680"/>
    <polygon points="1030,680 1060,450 1090,680"/>
    <polygon points="1140,680 1170,470 1200,680"/>
    <polygon points="1250,680 1280,440 1310,680"/>
    <polygon points="1360,680 1390,460 1420,680"/>
    <polygon points="1470,680 1500,480 1530,680"/>
    <polygon points="1580,680 1610,450 1640,680"/>
    <polygon points="1690,680 1720,470 1750,680"/>
    <polygon points="1800,680 1830,440 1860,680"/>
  </g>

  <!-- Trail path winding through -->
  <path d="M0,820 C200,800 300,780 500,790 C700,800 800,770 960,760 C1120,750 1200,780 1400,770 C1600,760 1700,740 1920,730" stroke="url(#trailGrad)" stroke-width="24" stroke-linecap="round" fill="none"/>
  <path d="M0,820 C200,800 300,780 500,790 C700,800 800,770 960,760 C1120,750 1200,780 1400,770 C1600,760 1700,740 1920,730" stroke="#78716c" stroke-width="2" stroke-dasharray="8 12" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Ground/terrain -->
  <path d="M0,850 C300,830 600,860 960,840 C1320,820 1600,850 1920,830 L1920,1080 L0,1080 Z" fill="#1c1917"/>
  <path d="M0,900 C400,880 700,920 960,900 C1220,880 1500,910 1920,890 L1920,1080 L0,1080 Z" fill="#0f0e0d"/>

  <!-- Rider silhouettes on trail -->
  <!-- Lead rider -->
  <g transform="translate(860, 710)">
    <!-- Bike -->
    <circle cx="0" cy="30" r="14" fill="none" stroke="#78716c" stroke-width="2" opacity="0.7"/>
    <circle cx="36" cy="30" r="14" fill="none" stroke="#78716c" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="30" x2="18" y2="10" stroke="#78716c" stroke-width="2" opacity="0.7"/>
    <line x1="36" y1="30" x2="18" y2="10" stroke="#78716c" stroke-width="2" opacity="0.7"/>
    <!-- Rider body -->
    <circle cx="14" cy="-6" r="6" fill="#78716c" opacity="0.7"/>
    <line x1="14" y1="0" x2="18" y2="10" stroke="#78716c" stroke-width="2" opacity="0.7"/>
    <line x1="14" y1="4" x2="6" y2="12" stroke="#78716c" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Second rider -->
  <g transform="translate(760, 720)">
    <circle cx="0" cy="28" r="12" fill="none" stroke="#57534e" stroke-width="1.5" opacity="0.5"/>
    <circle cx="32" cy="28" r="12" fill="none" stroke="#57534e" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="28" x2="16" y2="10" stroke="#57534e" stroke-width="1.5" opacity="0.5"/>
    <line x1="32" y1="28" x2="16" y2="10" stroke="#57534e" stroke-width="1.5" opacity="0.5"/>
    <circle cx="12" cy="-4" r="5" fill="#57534e" opacity="0.5"/>
    <line x1="12" y1="2" x2="16" y2="10" stroke="#57534e" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Third rider (further back) -->
  <g transform="translate(660, 730)">
    <circle cx="0" cy="24" r="10" fill="none" stroke="#44403c" stroke-width="1" opacity="0.35"/>
    <circle cx="28" cy="24" r="10" fill="none" stroke="#44403c" stroke-width="1" opacity="0.35"/>
    <line x1="0" y1="24" x2="14" y2="8" stroke="#44403c" stroke-width="1" opacity="0.35"/>
    <line x1="28" y1="24" x2="14" y2="8" stroke="#44403c" stroke-width="1" opacity="0.35"/>
    <circle cx="10" cy="-4" r="4" fill="#44403c" opacity="0.35"/>
  </g>

  <!-- Text overlay area -->
  <rect x="160" y="120" width="600" height="240" rx="0" fill="none"/>
  <text x="180" y="170" font-family="ui-monospace, monospace" font-size="12" fill="#57534e" letter-spacing="0.15em">501(c)(3) NONPROFIT</text>
  <text x="180" y="220" font-family="system-ui, sans-serif" font-size="48" fill="#a8a29e" font-weight="600" letter-spacing="-0.02em">Send It Society</text>
  <text x="180" y="268" font-family="system-ui, sans-serif" font-size="18" fill="#57534e">Galbraith Mountain, Bellingham, WA</text>
  <text x="180" y="300" font-family="system-ui, sans-serif" font-size="16" fill="#44403c">Every Saturday since 2019</text>

  <!-- Info cards at bottom -->
  <g>
    <rect x="160" y="920" width="200" height="70" rx="8" fill="#1c1917" stroke="#292524" stroke-width="1" opacity="0.8"/>
    <text x="180" y="950" font-family="system-ui" font-size="24" fill="#a8a29e" font-weight="600">85+</text>
    <text x="180" y="972" font-family="ui-monospace, monospace" font-size="10" fill="#57534e" letter-spacing="0.05em">Events</text>

    <rect x="400" y="920" width="200" height="70" rx="8" fill="#1c1917" stroke="#292524" stroke-width="1" opacity="0.8"/>
    <text x="420" y="950" font-family="system-ui" font-size="24" fill="#a8a29e" font-weight="600">Weekly</text>
    <text x="420" y="972" font-family="ui-monospace, monospace" font-size="10" fill="#57534e" letter-spacing="0.05em">Saturday Rides</text>

    <rect x="640" y="920" width="200" height="70" rx="8" fill="#1c1917" stroke="#292524" stroke-width="1" opacity="0.8"/>
    <text x="660" y="950" font-family="system-ui" font-size="24" fill="#a8a29e" font-weight="600">4</text>
    <text x="660" y="972" font-family="ui-monospace, monospace" font-size="10" fill="#57534e" letter-spacing="0.05em">Local Partners</text>
  </g>

  <!-- Subtle "For Matthew" in corner -->
  <text x="1740" y="1040" font-family="system-ui, sans-serif" font-size="13" fill="#292524" font-style="italic">For Matthew</text>
</svg>
